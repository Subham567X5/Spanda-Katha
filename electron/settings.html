<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline'; script-src 'unsafe-inline'" />
    <title>Settings</title>
    <style>
      :root {
        --bg: #07070d;
        --panel: #11111c;
        --line: #23233a;
        --accent: #00e5ff;
        --accent-dim: #008fa8;
        --text: #e8e8f0;
        --muted: #8a8aa3;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        overflow: hidden;
      }
      body {
        display: flex;
        flex-direction: column;
        padding: 24px;
      }
      h1 {
        font-size: 16px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        margin: 0 0 4px;
        color: var(--accent);
        text-shadow: 0 0 12px rgba(0, 229, 255, 0.4);
      }
      .sub {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 22px;
      }
      label {
        display: block;
        font-size: 11px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 8px;
      }
      .field {
        position: relative;
        margin-bottom: 18px;
      }
      input[type="password"], input[type="text"] {
        width: 100%;
        background: var(--panel);
        border: 1px solid var(--line);
        color: var(--text);
        padding: 11px 12px;
        font-size: 13px;
        font-family: ui-monospace, "Cascadia Mono", Consolas, monospace;
        outline: none;
        border-radius: 3px;
        transition: border-color 0.15s, box-shadow 0.15s;
      }
      input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 2px rgba(0, 229, 255, 0.15);
      }
      .row {
        display: flex;
        gap: 10px;
        align-items: center;
        margin-top: 6px;
      }
      .toggle {
        font-size: 11px;
        color: var(--muted);
        cursor: pointer;
        user-select: none;
      }
      .toggle:hover { color: var(--text); }
      .spacer { flex: 1; }
      .help {
        font-size: 11px;
        color: var(--muted);
        margin-top: 10px;
        line-height: 1.5;
      }
      .help a {
        color: var(--accent);
        text-decoration: none;
        cursor: pointer;
      }
      .help a:hover { text-decoration: underline; }
      .actions {
        margin-top: auto;
        display: flex;
        gap: 10px;
        justify-content: flex-end;
      }
      button {
        border: 1px solid var(--line);
        background: var(--panel);
        color: var(--text);
        padding: 10px 18px;
        font-size: 12px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        cursor: pointer;
        border-radius: 3px;
        transition: all 0.15s;
        font-family: inherit;
      }
      button:hover { border-color: var(--accent); color: var(--accent); }
      button.primary {
        background: var(--accent);
        color: #001016;
        border-color: var(--accent);
        font-weight: 600;
      }
      button.primary:hover { background: #33eaff; color: #001016; }
      .status {
        font-size: 11px;
        color: var(--accent-dim);
        min-height: 14px;
        margin-bottom: 8px;
      }
      .status.saved { color: #00ff9d; }
      .status.error { color: #ff5577; }
    </style>
  </head>
  <body>
    <h1>⚙ Settings</h1>
    <div class="sub">Elysium Writer · Cognitive Terminal</div>

    <div class="field">
      <label for="key">Gemini API Key</label>
      <input id="key" type="password" placeholder="AIza..." autocomplete="off" spellcheck="false" />
      <div class="row">
        <span class="toggle" id="showToggle">👁 Show</span>
        <span class="spacer"></span>
      </div>
      <div class="help">
        Required for AI generation, cover synthesis, and the Lore Oracle.
        Don't have one?
        <a id="getKeyLink">Get a free key from Google AI Studio →</a>
      </div>
    </div>

    <div class="status" id="status"></div>

    <div class="actions">
      <button id="clear">Clear</button>
      <button id="save" class="primary">Save</button>
    </div>

    <script>
      const api = window.settingsApi;
      const keyInput = document.getElementById("key");
      const statusEl = document.getElementById("status");
      const showToggle = document.getElementById("showToggle");

      function setStatus(msg, kind) {
        statusEl.textContent = msg || "";
        statusEl.className = "status" + (kind ? " " + kind : "");
      }

      (async () => {
        const existing = await api.getApiKey();
        if (existing) {
          keyInput.value = existing;
          setStatus("A key is already configured.", "saved");
        }
      })();

      showToggle.addEventListener("click", () => {
        const hidden = keyInput.type === "password";
        keyInput.type = hidden ? "text" : "password";
        showToggle.textContent = hidden ? "🙈 Hide" : "👁 Show";
      });

      document.getElementById("getKeyLink").addEventListener("click", (e) => {
        e.preventDefault();
        api.openExternal("https://aistudio.google.com/apikey");
      });

      document.getElementById("save").addEventListener("click", async () => {
        try {
          await api.setApiKey(keyInput.value);
          setStatus("Saved. AI features are now active.", "saved");
        } catch (err) {
          setStatus("Failed to save: " + (err && err.message ? err.message : err), "error");
        }
      });

      document.getElementById("clear").addEventListener("click", () => {
        keyInput.value = "";
        setStatus("Cleared — click Save to remove the key.", "");
        keyInput.focus();
      });
    </script>
  </body>
</html>
